<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Objednávka školního bufetu</title>
<style>
body {
 font-family: Arial, sans-serif;
 background: #f4f7fb;
}
h1 {
 text-align: center;
 background: #2a72d4;
 color: white;
 padding: 20px;
}
.container {
 width: 90%;
 max-width: 500px;
 margin: 30px auto;
 background: white;
 padding: 25px;
 border-radius: 12px;
}
.item {
 display: flex;
 justify-content: space-between;
 margin: 12px 0;
 font-size: 18px;
}
input[type="number"] {
 width: 70px;
 text-align: center;
}

/* ✅ NOVÁ POLE – styl */
.input-group {
 margin-top: 15px;
}
.input-group label {
 display: block;
 font-weight: bold;
 margin-bottom: 5px;
}
.input-group input {
 width: 100%;
 padding: 10px;
 font-size: 16px;
 border-radius: 6px;
 border: 1px solid #ccc;
}

#celkem, #pocet {
 text-align: center;
 font-size: 22px;
 margin-top: 15px;
 font-weight: bold;
 color: #2a72d4;
}

button {
 width: 100%;
 padding: 15px;
 margin-top: 30px;
 font-size: 24px;
 background: #ff6b35;
 color: white;
 border: none;
 border-radius: 10px;
 cursor: pointer;
}
button:hover {
 background: #e85a28;
}
</style>
</head>

<body>

<h1>SŠ Kostka – OBJEDNÁVKY BUFET</h1>

<div class="container">

 <div id="items"></div>

 <div id="celkem">Celková cena: 0 Kč</div>
 <div id="pocet">Počet kusů: 0</div>

 <!-- ✅ NOVÉ VSTUPNÍ POLE – JMÉNO -->
 <!-- ✅ MUSÍ BÝT VYPLNĚNO -->
 <div class="input-group">
  <label>VAŠE JMÉNO (Příjmení Jméno):</label>
  <input type="text" id="jmeno" placeholder="Novák Jan">
 </div>

 <!-- ✅ NOVÉ VSTUPNÍ POLE – TELEFON -->
 <!-- ✅ MUSÍ BÝT VYPLNĚNO -->
 <div class="input-group">
  <label>TELEFON:</label>
  <input type="text" id="telefon" placeholder="+420 000 000 000">
 </div>

 <!-- tlačítko -->
 <button onclick="odeslatObjednavku()">ODESLAT OBJEDNÁVKU</button>

</div>

<script>

let items = [];

// ✅ načítání CSV
async function loadCSV() {
 try {
  const response = await fetch("data_bufet.csv?t=" + Date.now());
  const text = await response.text();
  parseCSV(text);
  renderItems();
 } catch {
  alert("Chyba načítání CSV.");
 }
}

// ✅ parsování CSV
function parseCSV(text) {
 items = [];
 const lines = text.split("\n");

 for (let i = 1; i < lines.length; i++) {
  const line = lines[i].trim();
  if (!line) continue;

  const [nazev, cena] = line.split(";");

  items.push({
   nazev: nazev.trim(),
   cena: parseFloat(cena),
   mnozstvi: 0
  });
 }
}

// ✅ vykreslení
function renderItems() {
 const container = document.getElementById("items");
 container.innerHTML = "";

 items.forEach((item, index) => {
  const div = document.createElement("div");
  div.className = "item";

  div.innerHTML = `
   <span>${item.nazev} (${item.cena} Kč)</span>
   <input type="number" min="0" value="0"
    onchange="updateItem(${index}, this.value)">
  `;

  container.appendChild(div);
 });
}

// ✅ změna množství
function updateItem(index, value) {
 items[index].mnozstvi = parseInt(value) || 0;
 updateSummary();
}

// ✅ přepočet
function updateSummary() {
 let celkem = 0;
 let pocet = 0;

 items.forEach(item => {
  celkem += item.cena * item.mnozstvi;
  pocet += item.mnozstvi;
 });

 document.getElementById("celkem").innerText =
  "Celková cena: " + celkem.toFixed(2) + " Kč";

 document.getElementById("pocet").innerText =
  "Počet kusů: " + pocet;
}

// ✅ ODESLÁNÍ PŘES MAILTO
function odeslatObjednavku() {

 const jmeno = document.getElementById("jmeno").value.trim();
 const telefon = document.getElementById("telefon").value.trim();

 // ✅ kontrola vyplnění polí
 if (!jmeno || !telefon) {
  alert("Vyplň prosím jméno a telefon.");
  return;
 }

 const vybrane = items.filter(item => item.mnozstvi > 0);

 if (vybrane.length === 0) {
  alert("Nevybral jsi žádné položky!");
  return;
 }

 let celkem = 0;
 let pocet = 0;

 // ✅ sestavení textu objednávky
 let text = "Objednávka bufetu\n\n";
 text += "Jméno: " + jmeno + "\n";
 text += "Telefon: " + telefon + "\n\n";
 text += "Položky:\n";

 vybrane.forEach(item => {
  let cenaPolozky = item.cena * item.mnozstvi;
  text += `${item.nazev} - ${item.mnozstvi} ks - ${cenaPolozky} Kč\n`;

  celkem += cenaPolozky;
  pocet += item.mnozstvi;
 });

 text += "\nPočet kusů: " + pocet;
 text += "\nCelková cena: " + celkem.toFixed(2) + " Kč";

 // ✅ MAILTO FUNKCE
 // otevře e-mail klienta s vyplněným obsahem
 const mailto =
  `mailto:sklenarova.stella@kostka-skola.cz` +
  `?subject=Objednávka bufet` +
  `&body=${encodeURIComponent(text)}`;

 window.location.href = mailto;
}

// start
loadCSV();

</script>

</body>
</html>
